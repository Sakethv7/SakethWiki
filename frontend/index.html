<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SakethWiki</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Typography plugin for prose rendering -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          }
        },
        plugins: [],
      };
    </script>
    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      /* Prose styles for markdown rendering (since we're not using @tailwindcss/typography plugin) */
      .prose h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
      .prose h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem; }
      .prose h3 { font-size: 1rem; font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.25rem; }
      .prose p { margin-bottom: 0.5rem; line-height: 1.6; }
      .prose ul { list-style: disc; padding-left: 1.25rem; margin-bottom: 0.5rem; }
      .prose ol { list-style: decimal; padding-left: 1.25rem; margin-bottom: 0.5rem; }
      .prose li { margin-bottom: 0.25rem; }
      .prose a { color: #2563eb; text-decoration: underline; }
      .prose code { background: #f3f4f6; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 0.85em; font-family: monospace; }
      .prose pre { background: #1f2937; color: #f9fafb; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 0.75rem; }
      .prose pre code { background: none; padding: 0; color: inherit; }
      .prose strong { font-weight: 600; }
      .prose em { font-style: italic; }
      .prose blockquote { border-left: 3px solid #d1d5db; padding-left: 0.75rem; color: #6b7280; margin-bottom: 0.5rem; }
      .prose table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.85rem; }
      .prose th { background: #f9fafb; border: 1px solid #e5e7eb; padding: 0.375rem 0.5rem; text-align: left; font-weight: 600; }
      .prose td { border: 1px solid #e5e7eb; padding: 0.375rem 0.5rem; }
      .prose hr { border: none; border-top: 1px solid #e5e7eb; margin: 1rem 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
